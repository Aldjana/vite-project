name: Render Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        run: |
          if [ -z "${{ secrets.RENDER_PING_URL }}" ]; then
            echo "Missing secret RENDER_PING_URL"
            exit 1
          fi
          echo "Pinging $RENDER_PING_URL"
          curl -I -L -o /dev/null -s -w "%{http_code}\n" "$RENDER_PING_URL"
        env:
          RENDER_PING_URL: ${{ secrets.RENDER_PING_URL }}
